<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Block Bear">
    <meta name="theme-color" content="#2e2418">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Block Bear</title>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #2e2418;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        /* Phaser canvas (board/pieces) â€” below character canvas */
        canvas {
            display: block;
            margin: auto;
            position: relative;
            z-index: 20;
        }

        /* Three.js canvas: above Phaser board */
        canvas#char3d {
            position: fixed;
            z-index: 25;
            margin: 0;
        }

        /* CRT scanline overlay â€” borderless, sharp corners */
        #crt-overlay {
            display: none;
            position: fixed;
            z-index: 26;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 2px,
                rgba(0,0,0,0.07) 2px,
                rgba(0,0,0,0.07) 4px
            );
            box-shadow: inset 0 0 12px rgba(0,0,0,0.18);
            animation: crt-flicker 4.3s step-end infinite;
        }

        @keyframes crt-flicker {
            0%   { opacity: 1;    }
            62%  { opacity: 1;    }
            63%  { opacity: 0.78; }
            64%  { opacity: 1;    }
            72%  { opacity: 0.90; }
            73%  { opacity: 1;    }
            84%  { opacity: 1;    }
            85%  { opacity: 0.72; }
            86%  { opacity: 1;    }
            87%  { opacity: 0.88; }
            88%  { opacity: 1;    }
            95%  { opacity: 0.82; }
            96%  { opacity: 1;    }
            100% { opacity: 1;    }
        }

        /* Screen frame â€” borderless, sharp, neutral glow */
        #tv-frame {
            display: none;
            position: fixed;
            z-index: 22;
            pointer-events: none;
            background: #f4f2ee;
            box-shadow:
                0 0 55px rgba(220,215,205,0.30),
                0 0 22px rgba(180,175,165,0.18),
                0 10px 36px rgba(0,0,0,0.70);
        }

        /* Badge â€” hidden permanently */
        #char-badge {
            display: none !important;
        }

        @keyframes badge-pulse {
            0%, 100% { opacity: 0.40; }
            50%       { opacity: 0.78; }
        }

        /* Board vignette â€” subtle dark-red edge atmosphere when admin is active */
        #board-vignette {
            display: none;
            position: fixed;
            z-index: 21;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 50%, transparent 48%, rgba(0,0,0,0.18) 100%);
        }

        /* dialogue banner â€” full-width bottom bar, bear rests head on top edge */
        #dlg {
            display: none;
            position: fixed;
            z-index: 30;
            pointer-events: auto;
            box-sizing: border-box;
            background: rgba(5, 3, 8, 0.96);
            border: none;
            border-top: 2px solid rgba(120, 60, 60, 0.60);
            border-radius: 0;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
            text-align: center;
        }

        @keyframes banner-slide-in {
            from { clip-path: inset(0 100% 0 0); }
            to   { clip-path: inset(0 0% 0 0); }
        }

        /* Bear glitch — applied to char3d canvas during bear intrusion events */
        @keyframes bearGlitch {
            0%   { transform: translate(0,0);    filter: none; }
            8%   { transform: translate(-5px,2px); filter: saturate(9) hue-rotate(180deg) brightness(1.4); }
            9%   { transform: translate(0,0);    filter: none; }
            22%  { transform: translate(6px,-1px); filter: brightness(4) contrast(2) saturate(0); }
            23%  { transform: translate(0,0);    filter: none; }
            55%  { transform: translate(-3px,3px); filter: saturate(12) hue-rotate(300deg); }
            56%  { transform: translate(0,0);    filter: none; }
            80%  { transform: translate(5px,-2px); filter: hue-rotate(80deg) saturate(7) brightness(1.6); }
            81%  { transform: translate(0,0);    filter: none; }
            100% { transform: translate(0,0);    filter: none; }
        }
        canvas#char3d.glitching {
            animation: bearGlitch 0.55s steps(1) 3;
        }

        /* Lore overlay */
        #lore-overlay {
            position: fixed;
            z-index: 200;
            background: rgba(0,0,0,0.97);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: auto;
        }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script src="pieces.js?v=175"></script>
<script src="board.js?v=175"></script>
<script src="ui.js?v=175"></script>
<script src="characters.js?v=175"></script>
<script src="character3d.js?v=175"></script>
<script src="dialogue.js?v=175"></script>
<script src="menu.js?v=175"></script>
<script src="main.js?v=175"></script>

<div id="tv-frame"></div>
<div id="char-badge">the brainbreak</div>
<div id="board-vignette"></div>
<div id="crt-overlay"></div>
<div id="dlg"></div>
</body>
</html>
